<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LYNK By Legends</title>
  <link rel="icon" href="assets/logo.jpg" type="image/jpeg" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --g1: #a855f7;
      --g2: #06b6d4;
      --g3: #3b82f6;
    }

    html, body {
      height: 100%;
      font-family: 'Inter', sans-serif;
      background: #0a0a0f;
      color: #fff;
      overflow: hidden;
    }

    .splash {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      position: relative;
    }

    /* Ambient glow orbs */
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0;
      animation: orbIn 1.2s ease forwards;
    }
    .orb-1 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, #a855f740, transparent);
      top: -10%; left: -10%;
      animation-delay: 0.1s;
    }
    .orb-2 {
      width: 350px; height: 350px;
      background: radial-gradient(circle, #06b6d430, transparent);
      bottom: -5%; right: -5%;
      animation-delay: 0.3s;
    }
    .orb-3 {
      width: 250px; height: 250px;
      background: radial-gradient(circle, #3b82f625, transparent);
      top: 40%; left: 60%;
      animation-delay: 0.5s;
    }
    @keyframes orbIn {
      to { opacity: 1; }
    }

    /* Logo ring */
    .logo-ring {
      position: relative;
      width: 100px;
      height: 100px;
      margin-bottom: 32px;
      opacity: 0;
      transform: scale(0.6);
      animation: ringPop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 0.4s forwards;
    }
    @keyframes ringPop {
      to { opacity: 1; transform: scale(1); }
    }

    .logo-ring svg.ring {
      position: absolute;
      inset: 0;
      animation: spin 3s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .logo-ring-inner {
      position: absolute;
      inset: 12px;
      border-radius: 50%;
      background: linear-gradient(135deg, #a855f7, #06b6d4, #3b82f6);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 22px;
      letter-spacing: -0.05em;
      color: white;
      box-shadow: 0 0 30px #a855f750;
    }

    /* Wordmark */
    .wordmark {
      opacity: 0;
      transform: translateY(12px);
      animation: slideUp 0.5s ease 0.8s forwards;
    }
    @keyframes slideUp {
      to { opacity: 1; transform: translateY(0); }
    }

    .wordmark-lynk {
      font-size: 3rem;
      font-weight: 900;
      letter-spacing: -0.05em;
      background: linear-gradient(135deg, #a855f7, #06b6d4, #3b82f6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
    }

    .wordmark-sub {
      font-size: 0.85rem;
      font-weight: 400;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
      text-align: center;
      margin-top: 4px;
    }

    /* Tagline */
    .tagline {
      margin-top: 20px;
      font-size: 0.9rem;
      color: rgba(255,255,255,0.5);
      opacity: 0;
      animation: slideUp 0.5s ease 1.1s forwards;
    }

    /* Progress bar */
    .progress-wrap {
      margin-top: 48px;
      width: 160px;
      height: 3px;
      background: rgba(255,255,255,0.08);
      border-radius: 999px;
      overflow: hidden;
      opacity: 0;
      animation: fadeIn 0.3s ease 1.3s forwards;
    }
    @keyframes fadeIn {
      to { opacity: 1; }
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #a855f7, #06b6d4, #3b82f6);
      border-radius: 999px;
      animation: fillBar 1.5s ease 1.4s forwards;
    }
    @keyframes fillBar {
      0% { width: 0%; }
      60% { width: 70%; }
      100% { width: 100%; }
    }

    /* Dots */
    .dots {
      display: flex;
      gap: 6px;
      margin-top: 16px;
      opacity: 0;
      animation: fadeIn 0.3s ease 1.5s forwards;
    }
    .dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: rgba(255,255,255,0.25);
      animation: dotPulse 1.2s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes dotPulse {
      0%, 100% { background: rgba(255,255,255,0.2); transform: scale(1); }
      50% { background: #a855f7; transform: scale(1.4); }
    }

    /* Fade out whole page */
    body.fade-out {
      animation: fadeOut 0.5s ease forwards;
    }
    @keyframes fadeOut {
      to { opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="splash">
    <!-- Ambient orbs -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <!-- Logo ring -->
    <div class="logo-ring">
      <svg class="ring" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="50" cy="50" r="46" stroke="url(#ringGrad)" stroke-width="2" stroke-dasharray="12 8" stroke-linecap="round"/>
        <defs>
          <linearGradient id="ringGrad" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#a855f7"/>
            <stop offset="50%" stop-color="#06b6d4"/>
            <stop offset="100%" stop-color="#3b82f6"/>
          </linearGradient>
        </defs>
      </svg>
      <div class="logo-ring-inner" style="padding:0;overflow:hidden">
        <img src="assets/logo.jpg" alt="LYNK" style="width:100%;height:100%;object-fit:cover;border-radius:50%"
             onerror="this.style.display='none';this.parentElement.innerHTML='<span style=\'font-weight:900;font-size:22px\'>LYNK</span>'" />
      </div>
    </div>

    <!-- Wordmark -->
    <div class="wordmark">
      <div class="wordmark-lynk">LYNK</div>
      <div class="wordmark-sub">By Legends</div>
    </div>

    <!-- Tagline -->
    <p class="tagline">Your campus, connected.</p>

    <!-- Progress -->
    <div class="progress-wrap">
      <div class="progress-bar"></div>
    </div>
    <div class="dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>

  <script type="module">
    import { auth } from './js/firebase-config.js';
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    // Apply saved theme
    const t = localStorage.getItem('lynk-theme') || 'dark';
    if (t === 'light') document.body.style.background = '#f8fafc';

    // After splash animation (2.8s), redirect based on auth state
    const SPLASH_DURATION = 2800;

    onAuthStateChanged(auth, (user) => {
      setTimeout(() => {
        document.body.classList.add('fade-out');
        setTimeout(() => {
          window.location.replace(user ? 'feed.html' : 'auth.html');
        }, 500);
      }, SPLASH_DURATION);
    });

    // Fallback if Firebase takes too long
    setTimeout(() => {
      if (!document.body.classList.contains('fade-out')) {
        document.body.classList.add('fade-out');
        setTimeout(() => window.location.replace('auth.html'), 500);
      }
    }, 5000);
  </script>
</body>
</html>
