<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LYNK By Legends</title>
  <link rel="icon" href="assets/logo.jpg" type="image/jpeg" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Theme tokens ── */
    :root {
      --g1: #a855f7;
      --g2: #06b6d4;
      --g3: #3b82f6;
    }
    [data-theme="dark"],
    [data-theme="midnight"],
    [data-theme="sunset"],
    [data-theme="ocean"],
    [data-theme="forest"] {
      --bg:     #0a0a0f;
      --muted:  rgba(255, 255, 255, 0.13);
    }
    [data-theme="light"] {
      --bg:     #f4f5f7;
      --muted:  rgba(0, 0, 0, 0.12);
    }

    /* Fallback via OS preference (before JS runs) */
    @media (prefers-color-scheme: light) {
      :root { --bg: #f4f5f7; --muted: rgba(0,0,0,0.12); }
    }
    @media (prefers-color-scheme: dark) {
      :root { --bg: #0a0a0f; --muted: rgba(255,255,255,0.13); }
    }

    html, body {
      height: 100%;
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      overflow: hidden;
      transition: background 0.3s;
    }

    /* ── Stage ── */
    .splash {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 0;
    }

    /* ── LYNK wordmark ── */
    .wordmark-wrap {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .wordmark {
      font-size: clamp(4.5rem, 20vw, 9rem);
      font-weight: 900;
      letter-spacing: -0.04em;
      line-height: 1;
      user-select: none;

      /*
        Two-zone horizontal gradient:
          left zone  → vivid LYNK gradient colours
          right zone → muted (the "unpainted" state)
        We make the background 210% wide, then animate
        background-position from 100% → 0% so the gradient
        sweeps from left to right across the letters.
      */
      background: linear-gradient(90deg,
        var(--g1) 0%,
        var(--g2) 28%,
        var(--g3) 48%,
        var(--muted) 56%,
        var(--muted) 100%
      );
      background-size: 210% 100%;
      background-position: 100% 0;   /* starts fully muted */
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;

      /* Phase 1 — sweep in */
      animation: paintSweep 1.3s cubic-bezier(0.45, 0, 0.25, 1) 0.25s forwards;
    }

    @keyframes paintSweep {
      from { background-position: 100% 0; }
      to   { background-position:   0% 0; }
    }

    /* Phase 2 — after sweep, shimmer loops to show it's still alive */
    .wordmark.shimmering {
      background: linear-gradient(90deg,
        var(--g1) 0%,
        var(--g2) 30%,
        var(--g3) 55%,
        var(--g1) 70%,
        var(--g2) 85%,
        var(--g3) 100%
      );
      background-size: 300% 100%;
      background-position: 0% 0;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmerLoop 2s linear infinite;
    }

    @keyframes shimmerLoop {
      0%   { background-position: 0%   0; }
      100% { background-position: 100% 0; }
    }

    /* ── Page-level fade-out on redirect ── */
    body.fade-out {
      animation: fadeOut 0.45s ease forwards;
    }
    @keyframes fadeOut { to { opacity: 0; } }
  </style>
</head>
<body>
  <div class="splash">
    <div class="wordmark-wrap">
      <div class="wordmark" id="wm">LYNK</div>
    </div>
  </div>

  <script>
    /* ── Apply saved theme immediately (before module loads) ── */
    (function () {
      const saved = localStorage.getItem('lynk-theme') || 'system';
      let resolved = saved;
      if (saved === 'system') {
        resolved = window.matchMedia('(prefers-color-scheme: light)').matches
          ? 'light' : 'dark';
      }
      document.documentElement.setAttribute('data-theme', resolved);
    })();
  </script>

  <script type="module">
    import { auth } from './js/firebase-config.js';
    import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';

    const wm = document.getElementById('wm');

    /* After the sweep animation finishes, switch to the shimmer loop */
    const SWEEP_MS = 1550; /* 0.25s delay + 1.3s animation */
    setTimeout(() => {
      wm.classList.add('shimmering');
    }, SWEEP_MS);

    /* Redirect after splash (total 2.6 s) */
    const SPLASH_MS = 2600;
    let redirected = false;

    function go(user) {
      if (redirected) return;
      redirected = true;
      document.body.classList.add('fade-out');
      setTimeout(() => {
        window.location.replace(user ? 'feed.html' : 'auth.html');
      }, 450);
    }

    onAuthStateChanged(auth, (user) => {
      setTimeout(() => go(user), SPLASH_MS);
    });

    /* Safety fallback if Firebase stalls */
    setTimeout(() => go(null), 5000);
  </script>
</body>
</html>
