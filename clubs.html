<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clubs & Organizations — LYNK By Legends</title>
  <link rel="icon" href="assets/logo.jpg" type="image/jpeg" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/custom.css" />

</head>
<body>
<nav class="lynk-nav h-16 flex items-center px-4 justify-between gap-2">
  <div class="flex items-center gap-2 flex-shrink-0">
    <button id="hamburger-btn" onclick="openMobileNav()"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
    <a href="feed.html" class="flex flex-col leading-none"><span class="logo-text">LYNK</span><span class="logo-sub">By Legends</span></a>
  </div>
  <div class="flex-1 max-w-sm mx-2">
    <div class="search-pill">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--text-muted);flex-shrink:0"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" placeholder="Search clubs..." oninput="searchClubs(this.value)" />
    </div>
  </div>
  <div class="flex items-center gap-2">
    <button onclick="showCreateClub()" class="lynk-btn lynk-btn-primary text-sm py-2 px-3">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Create Club
    </button>
    <a href="profile.html"><img id="nav-avatar" src="https://ui-avatars.com/api/?name=User&background=a855f7&color=fff" class="lynk-avatar w-9 h-9" /></a>
  </div>
</nav>
<div id="drawer-overlay" class="lynk-drawer-overlay" onclick="closeMobileNav()"></div>

<aside class="lynk-sidebar pt-4 pb-20">
  <nav class="flex flex-col gap-0.5">
    <a href="feed.html" class="lynk-sidebar-link"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span>Home Feed</span></a>
    <a href="communities.html" class="lynk-sidebar-link"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg><span>Communities</span></a>
    <a href="marketplace.html" class="lynk-sidebar-link"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/></svg><span>Marketplace</span></a>
    <a href="ai.html" class="lynk-sidebar-link"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg><span>LYNK AI</span></a>
    <a href="events.html" class="lynk-sidebar-link"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg><span>Events</span></a>
    <a href="clubs.html" class="lynk-sidebar-link active"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg><span>Clubs</span></a>
    <div class="h-px mx-4 my-2" style="background:var(--border)"></div>
    <a href="chat.html" class="lynk-sidebar-link"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><span>Messages</span></a>
    <a href="profile.html" class="lynk-sidebar-link"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span>My Profile</span></a>
    <a href="premium.html" class="lynk-sidebar-link"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg><span style="color:var(--grad-1)">LYNK Premium</span></a>
    <a href="settings.html" class="lynk-sidebar-link"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/></svg><span>Settings</span></a>
    <a href="admin.html" id="admin-link" class="lynk-sidebar-link hidden"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg><span>Admin Panel</span></a>
    <a href="#" onclick="signOut()" class="lynk-sidebar-link" style="color:#ef4444"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg><span>Sign Out</span></a>
  </nav>
</aside>

<main class="main-content">
  <div class="max-w-5xl mx-auto px-4 py-6">
    <div class="flex items-center justify-between mb-6">
      <div><h1 class="text-2xl font-bold">Clubs & Organizations</h1><p class="text-sm mt-1" style="color:var(--text-muted)">Join clubs and connect with like-minded students</p></div>
    </div>

    <div class="flex gap-2 mb-5 overflow-x-auto pb-1">
      <button class="lynk-tab active" onclick="filterClubs('all',this)">All Clubs</button>
      <button class="lynk-tab" onclick="filterClubs('mine',this)">My Clubs</button>
      <button class="lynk-tab" onclick="filterClubs('academic',this)">Academic</button>
      <button class="lynk-tab" onclick="filterClubs('sports',this)">Sports</button>
      <button class="lynk-tab" onclick="filterClubs('arts',this)">Arts</button>
      <button class="lynk-tab" onclick="filterClubs('tech',this)">Tech</button>
      <button class="lynk-tab" onclick="filterClubs('religious',this)">Religious</button>
      <button class="lynk-tab" onclick="filterClubs('social',this)">Social</button>
    </div>

    <div id="clubs-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
      <div class="col-span-full text-center py-10" style="color:var(--text-muted)">
        <div class="spinner w-8 h-8 border-4 rounded-full mx-auto mb-3" style="border-color:var(--grad-1);border-top-color:transparent"></div>
        Loading clubs...
      </div>
    </div>
  </div>
</main>

<!-- CLUB DETAIL MODAL -->
<div id="club-modal" class="lynk-modal-overlay hidden" onclick="closeClubModal(event)">
  <div class="w-full max-w-2xl max-h-[90vh] overflow-y-auto rounded-2xl" style="background:var(--bg-card);margin:16px" onclick="event.stopPropagation()">
    <div id="club-modal-content"></div>
  </div>
</div>

<!-- CREATE CLUB MODAL -->
<div id="create-club-modal" class="lynk-modal-overlay hidden" onclick="closeCreateClub(event)">
  <div class="w-full max-w-md rounded-2xl p-6" style="background:var(--bg-card);margin:16px" onclick="event.stopPropagation()">
    <div class="flex items-center justify-between mb-5">
      <h3 class="text-lg font-bold">Create Club / Organization</h3>
      <button onclick="closeCreateClub()" class="lynk-icon-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="flex flex-col gap-4">
      <div><label class="text-xs font-semibold mb-1 block" style="color:var(--text-muted)">CLUB NAME *</label><input id="club-name" class="lynk-input" placeholder="e.g. Coding Club, Debate Society..." /></div>
      <div><label class="text-xs font-semibold mb-1 block" style="color:var(--text-muted)">DESCRIPTION</label><textarea id="club-desc" class="lynk-input resize-none" rows="3" placeholder="What does your club do?"></textarea></div>
      <div><label class="text-xs font-semibold mb-1 block" style="color:var(--text-muted)">CATEGORY</label>
        <select id="club-category" class="lynk-input">
          <option value="academic">📚 Academic</option>
          <option value="tech">💻 Tech</option>
          <option value="sports">⚽ Sports</option>
          <option value="arts">🎨 Arts & Culture</option>
          <option value="religious">🕌 Religious</option>
          <option value="social">🤝 Social</option>
          <option value="political">🗳️ Political</option>
          <option value="other">📌 Other</option>
        </select>
      </div>
      <div><label class="text-xs font-semibold mb-1 block" style="color:var(--text-muted)">ICON (emoji)</label><input id="club-icon" class="lynk-input" placeholder="e.g. 💻 ⚽ 🎨" maxlength="4" value="⭐" /></div>
      <div><label class="text-xs font-semibold mb-1 block" style="color:var(--text-muted)">MEMBERSHIP TYPE</label>
        <select id="club-membership" class="lynk-input">
          <option value="open">Open (anyone can join)</option>
          <option value="request">Request to join</option>
          <option value="invite">Invite only</option>
        </select>
      </div>
      <button onclick="submitClub()" class="lynk-btn lynk-btn-primary w-full">Create Club</button>
    </div>
  </div>
</div>

<nav class="lynk-bottom-nav">
  <a href="feed.html"><div class="bnav-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></div><span>Home</span></a>
  <a href="communities.html"><div class="bnav-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg></div><span>Groups</span></a>
  <a href="events.html"><div class="bnav-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></div><span>Events</span></a>
  <a href="clubs.html" class="active"><div class="bnav-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></div><span>Clubs</span></a>
  <a href="ai.html"><div class="bnav-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></div><span>AI</span></a>
</nav>

</body>
</html>
