<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="google-adsense-account" content="ca-pub-4316159694380125">
  <title>LYNK By Legends</title>
  <link rel="icon" href="assets/logo.jpg" type="image/jpeg" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Theme tokens ── */
    :root {
      --g1: #a855f7;
      --g2: #06b6d4;
      --g3: #3b82f6;
    }
    [data-theme="dark"],
    [data-theme="midnight"],
    [data-theme="sunset"],
    [data-theme="ocean"],
    [data-theme="forest"] {
      --bg: #0a0a0f;
    }
    [data-theme="light"] {
      --bg: #f4f5f7;
    }

    /* Fallback via OS preference (before JS runs) */
    @media (prefers-color-scheme: light) {
      :root { --bg: #f4f5f7; }
    }
    @media (prefers-color-scheme: dark) {
      :root { --bg: #0a0a0f; }
    }

    html, body {
      height: 100%;
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      overflow: hidden;
      transition: background 0.3s;
    }

    /* ── Stage ── */
    .splash {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 0;
    }

    /* ── LYNK wordmark ── */
    .wordmark {
      display: flex;
      align-items: center;
      gap: 0.02em;
      font-size: clamp(4.5rem, 20vw, 9rem);
      font-weight: 900;
      letter-spacing: -0.04em;
      line-height: 1;
      user-select: none;
    }

    /* Each letter animates in independently */
    .letter {
      display: inline-block;
      background: linear-gradient(135deg, var(--g1) 0%, var(--g2) 50%, var(--g3) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;

      opacity: 0;
      transform: translateY(0.2em) scale(0.78);
      animation: letterPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    /* Stagger: L → Y → N → K */
    .letter:nth-child(1) { animation-delay: 0.08s; }
    .letter:nth-child(2) { animation-delay: 0.20s; }
    .letter:nth-child(3) { animation-delay: 0.32s; }
    .letter:nth-child(4) { animation-delay: 0.44s; }

    @keyframes letterPop {
      0%   { opacity: 0; transform: translateY(0.2em) scale(0.78); }
      100% { opacity: 1; transform: translateY(0)     scale(1);    }
    }

    /* Gentle pulse while auth check runs */
    .wordmark.pulsing .letter {
      animation: wordPulse 1.8s ease-in-out infinite;
    }
    .wordmark.pulsing .letter:nth-child(2) { animation-delay: 0.1s; }
    .wordmark.pulsing .letter:nth-child(3) { animation-delay: 0.2s; }
    .wordmark.pulsing .letter:nth-child(4) { animation-delay: 0.3s; }

    @keyframes wordPulse {
      0%, 100% { opacity: 1;   transform: translateY(0) scale(1);    }
      50%       { opacity: 0.6; transform: translateY(0) scale(0.97); }
    }

    /* ── Page-level fade-out on redirect ── */
    body.fade-out {
      animation: fadeOut 0.45s ease forwards;
    }
    @keyframes fadeOut { to { opacity: 0; } }
  </style>
</head>
<body>
  <div class="splash">
    <div class="wordmark" id="wm">
      <span class="letter">L</span>
      <span class="letter">Y</span>
      <span class="letter">N</span>
      <span class="letter">K</span>
    </div>
  </div>

  <script>
    /* ── Apply saved theme immediately (before module loads) ── */
    (function () {
      const saved = localStorage.getItem('lynk-theme') || 'system';
      let resolved = saved;
      if (saved === 'system') {
        resolved = window.matchMedia('(prefers-color-scheme: light)').matches
          ? 'light' : 'dark';
      }
      document.documentElement.setAttribute('data-theme', resolved);
    })();
  </script>

  <script type="module">
    import { auth } from './js/firebase-config.js';
    import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';

    const wm = document.getElementById('wm');

    /* After all letters have popped in (~0.95s total), switch to gentle pulse */
    setTimeout(() => {
      wm.classList.add('pulsing');
    }, 960);

    /* Redirect after splash (total 2.6 s) */
    const SPLASH_MS = 2600;
    let redirected = false;

    function go(user) {
      if (redirected) return;
      redirected = true;
      document.body.classList.add('fade-out');
      setTimeout(() => {
        window.location.replace(user ? 'feed.html' : 'index.html?landing=1');
      }, 450);
    }

    onAuthStateChanged(auth, (user) => {
      setTimeout(() => go(user), SPLASH_MS);
    });

    /* Safety fallback if Firebase stalls */
    setTimeout(() => go(null), 5000);
  </script>
</body>
</html>
