<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Messages — LYNK By Legends</title>
  <link rel="icon" href="assets/logo.jpg" type="image/jpeg" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/custom.css" />
</head>
<body>

<!-- NAVBAR -->
<nav class="lynk-nav h-16 flex items-center px-6 justify-between">
  <div class="flex items-center gap-2">
    <button id="hamburger-btn" onclick="openMobileNav()" aria-label="Open menu">☰</button>
    <a href="index.html" class="flex flex-col leading-none">
      <span class="logo-text">LYNK</span>
      <span class="logo-sub">By Legends</span>
    </a>
  </div>
  <div class="flex items-center gap-3">
    <button id="theme-toggle" class="lynk-btn lynk-btn-ghost p-2 rounded-full"><span id="theme-icon">☀️</span></button>
    <a href="feed.html" class="lynk-btn lynk-btn-secondary text-sm">← Feed</a>
  </div>
</nav>

<div id="drawer-overlay" class="lynk-drawer-overlay" onclick="closeMobileNav()"></div>

<!-- CHAT LAYOUT -->
<div class="flex h-[calc(100vh-64px)] mt-16">

  <!-- Conversations Sidebar -->
  <div class="w-80 flex flex-col border-r" style="background:var(--bg-card);border-color:var(--border);flex-shrink:0">
    <!-- Header -->
    <div class="p-4 border-b" style="border-color:var(--border)">
      <div class="flex items-center justify-between mb-3">
        <h2 class="font-bold text-lg">Messages</h2>
        <button onclick="showNewChatModal()" class="lynk-btn lynk-btn-primary p-2 rounded-xl text-sm" data-tooltip="New Chat">✏️</button>
      </div>
      <input type="text" id="conv-search" class="lynk-input text-sm py-2" placeholder="🔍 Search conversations..." oninput="searchConversations(this.value)" />
    </div>
    <!-- Conversations List -->
    <div id="conversations-list" class="flex-1 overflow-y-auto">
      <!-- Skeletons -->
      <div class="p-4 border-b animate-pulse" style="border-color:var(--border)">
        <div class="flex gap-3">
          <div class="w-12 h-12 rounded-full flex-shrink-0" style="background:var(--border)"></div>
          <div class="flex-1">
            <div class="h-3 rounded w-1/2 mb-2" style="background:var(--border)"></div>
            <div class="h-3 rounded w-3/4" style="background:var(--border)"></div>
          </div>
        </div>
      </div>
      <div class="p-4 border-b animate-pulse" style="border-color:var(--border)">
        <div class="flex gap-3">
          <div class="w-12 h-12 rounded-full flex-shrink-0" style="background:var(--border)"></div>
          <div class="flex-1">
            <div class="h-3 rounded w-2/3 mb-2" style="background:var(--border)"></div>
            <div class="h-3 rounded w-1/2" style="background:var(--border)"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Chat Window -->
  <div id="chat-window" class="flex-1 flex flex-col" style="background:var(--bg-primary)">

    <!-- Empty state -->
    <div id="chat-empty-state" class="flex-1 flex flex-col items-center justify-center text-center p-8">
      <div class="text-6xl mb-4">💬</div>
      <h3 class="text-xl font-bold mb-2">Your Messages</h3>
      <p style="color:var(--text-secondary)" class="mb-6">Select a conversation or start a new one with a friend.</p>
      <button onclick="showNewChatModal()" class="lynk-btn lynk-btn-primary px-6 py-3 rounded-xl">✏️ New Message</button>
    </div>

    <!-- Active Chat Header -->
    <div id="chat-header" class="hidden p-4 border-b flex items-center gap-3" style="border-color:var(--border);background:var(--bg-card)">
      <div class="relative flex-shrink-0">
        <img id="chat-header-avatar" src="" class="lynk-avatar w-10 h-10" />
        <span id="chat-online-dot" class="online-dot hidden"></span>
      </div>
      <div class="flex-1">
        <p id="chat-header-name" class="font-semibold text-sm"></p>
        <p id="chat-header-status" class="text-xs" style="color:var(--text-muted)">Offline</p>
      </div>
      <div class="flex gap-2">
        <a id="chat-header-profile" href="#" class="lynk-btn lynk-btn-ghost p-2 rounded-xl text-sm" data-tooltip="View Profile">👤</a>
      </div>
    </div>

    <!-- Messages Area -->
    <div id="messages-area" class="hidden flex-1 overflow-y-auto p-4 flex flex-col gap-3">
      <!-- Messages injected by JS -->
    </div>

    <!-- Typing Indicator -->
    <div id="typing-indicator" class="hidden px-4 py-1">
      <div class="flex items-center gap-2">
        <span class="text-xs" style="color:var(--text-muted)" id="typing-text">Someone is typing</span>
        <span class="typing-dot"></span>
        <span class="typing-dot"></span>
        <span class="typing-dot"></span>
      </div>
    </div>

    <!-- Message Input -->
    <div id="message-input-area" class="hidden p-4 border-t" style="border-color:var(--border);background:var(--bg-card)">
      <div class="flex items-end gap-3">
        <label class="lynk-btn lynk-btn-ghost p-2 rounded-xl cursor-pointer flex-shrink-0" data-tooltip="Attach file">
          📎
          <input type="file" class="hidden" onchange="attachFile(this)" />
        </label>
        <div class="flex-1 relative">
          <textarea id="msg-input" class="lynk-input resize-none text-sm py-3 pr-12" rows="1" placeholder="Type a message..."
            oninput="autoResizeTextarea(this); handleTyping()"
            onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage();}">
          </textarea>
        </div>
        <button onclick="sendMessage()" id="send-btn" class="lynk-btn lynk-btn-primary p-3 rounded-xl flex-shrink-0">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
          </svg>
        </button>
      </div>
    </div>

  </div>
</div>

<!-- NEW CHAT MODAL -->
<div id="new-chat-modal" class="lynk-modal-overlay hidden">
  <div class="lynk-card p-6 w-full max-w-md mx-4">
    <div class="flex items-center justify-between mb-4">
      <h3 class="font-bold text-lg">New Message</h3>
      <button onclick="hideNewChatModal()" class="lynk-btn lynk-btn-ghost p-1">✕</button>
    </div>
    <input type="text" id="friend-search-input" class="lynk-input mb-4" placeholder="🔍 Search friends by name..." oninput="searchFriendsForChat(this.value)" />
    <div id="friend-search-results" class="flex flex-col gap-2 max-h-64 overflow-y-auto">
      <p class="text-sm text-center py-4" style="color:var(--text-muted)">Start typing to search your friends...</p>
    </div>
  </div>
</div>

<script type="module" src="js/chat.js"></script>
<script>
  function showNewChatModal() { document.getElementById('new-chat-modal').classList.remove('hidden'); }
  function hideNewChatModal() { document.getElementById('new-chat-modal').classList.add('hidden'); }
  function autoResizeTextarea(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }
</script>
<nav class="lynk-bottom-nav">
  <a href="feed.html"><span class="bnav-icon">🏠</span>Home</a>
  <a href="search.html"><span class="bnav-icon">🔍</span>Search</a>
  <a href="announcements.html"><span class="bnav-icon">📢</span>Alerts</a>
  <a href="chat.html" class="active"><span class="bnav-icon">💬</span>Chat</a>
  <a href="profile.html"><span class="bnav-icon">👤</span>Profile</a>
</nav>
<script src="js/mobile-nav.js"></script>
</body>
</html>
